run_name: resnet50_full_finetune

# Data
# data_pipeline: torchvision (default, with our val holdout) | hf (mirrors part 3, no val holdout)
data_pipeline: hf #torchvision
data_root: ./data
hf_cache_dir: null
image_size: 224
batch_size: 64
num_workers: 2

# Optim
epochs: 30
lr: 1.0e-3
momentum: 0.9
weight_decay: 5.0e-4
nesterov: true

# Misc
seed: 42
output_dir: ./part2_finetune_resnet50
