run_name: vit_b16_full_finetune

# Model: resnet50 | vit_b16
model_name: vit_b16

# Data
# data_pipeline: torchvision (default, with our val holdout) | hf (mirrors part 3, no val holdout)
data_pipeline: hf #torchvision
train_aug: true
data_root: ./data
hf_cache_dir: null
image_size: 224
batch_size: 64
num_workers: 2

# Optim: sgd | adamw   /   scheduler: manual | cosine | cosine_warmup
optimizer: adamw
scheduler: cosine_warmup
warmup_epochs: 3
epochs: 30
lr: 1.0e-4
momentum: 0.9
weight_decay: 1.0e-4
nesterov: true

# Misc
seed: 42
output_dir: ./part2_finetune_resnet50
